<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>吉伊卡哇 ASMR - 終極修復版</title>
    
    <link rel="apple-touch-icon" href="icon.png.webp">
    <link rel="icon" href="icon.png.webp">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #fff5f5;
            --text-color: #f472b6;
            --btn-bg: #ffffff;
            --btn-border: #f472b6;
        }
        .night-mode {
            --bg-color: #0f172a;
            --text-color: #38bdf8;
            --btn-bg: #1e293b;
            --btn-border: #38bdf8;
        }

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            font-family: -apple-system, system-ui, sans-serif; 
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
            width: 100vw; height: 100vh;
        }

        /* 產球感應區：避開底部按鈕高度 */
        #spawn-area {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: calc(100% - 120px); /* 留出底部給按鈕，絕對不重疊 */
            z-index: 10;
        }

        /* 按鈕容器：完全獨立，保證點擊權 */
        #controls { 
            position: absolute; 
            bottom: 0;
            width: 100%; 
            height: 120px;
            display: flex; justify-content: center; align-content: center;
            gap: 8px; z-index: 9999; 
            flex-wrap: wrap; padding: 10px; box-sizing: border-box; 
            background: transparent;
            pointer-events: auto;
        }

        button { 
            background: var(--btn-bg); border: 2.5px solid var(--btn-border); color: var(--text-color); 
            padding: 10px 14px; border-radius: 20px; cursor: pointer; 
            font-size: 0.85rem; font-weight: bold; 
            box-shadow: 0 4px 0px var(--btn-border); 
            transition: transform 0.1s;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            display: inline-block;
            pointer-events: auto;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0px var(--btn-border); }
        
        #magnet-btn.active { background: #f472b6 !important; color: white !important; }
        .night-mode #magnet-btn.active { background: #38bdf8 !important; color: #0f172a !important; }
        #sensor-btn.active { background: #10b981 !important; border-color: #10b981 !important; color: white !important; }

        .dom-item { position: absolute; background-size: cover; border-radius: 50%; pointer-events: none; z-index: 50; background-color: #ffd1dc; }
        #magnet-cursor { position: absolute; width: 150px; height: 150px; border: 2px dashed var(--text-color); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%) scale(0); z-index: 5; opacity: 0.2; }
    </style>
</head>
<body>

    <div id="spawn-area"></div>

    <div id="controls">
        <button id="theme-btn">🌙 深夜</button>
        <button id="sensor-btn">🪄 體感</button>
        <button id="magnet-btn">🧲 磁力</button>
        <button id="rain-btn">🌸 降落</button>
        <button id="bomb-btn">💥 彈開</button>
        <button id="clear-btn">🧹 清空</button>
    </div>

    <div id="magnet-cursor"></div>

    <script>
        const { Engine, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body, Vector } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        const magnetCursor = document.getElementById('magnet-cursor');
        const spawnArea = document.getElementById('spawn-area');
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playOrganicSound(intensity) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350 * (0.9 + Math.random()*0.2), now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(Math.min(intensity * 0.08, 0.3), now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.15);
            } catch(e){}
        }

        Runner.run(Runner.create(), engine);

        const domItems = [];
        const wallThickness = 500;
        function createWalls() {
            Composite.allBodies(world).filter(b => b.isStatic).forEach(b => Composite.remove(world, b));
            const w = window.innerWidth, h = window.innerHeight;
            Composite.add(world, [
                Bodies.rectangle(w/2, h + wallThickness/2, w + wallThickness*2, wallThickness, {isStatic:true, restitution:0.6}),
                Bodies.rectangle(w/2, -wallThickness/2, w + wallThickness*2, wallThickness, {isStatic:true, restitution:0.6}),
                Bodies.rectangle(-wallThickness/2, h/2, wallThickness, h + wallThickness*2, {isStatic:true, restitution:0.6}),
                Bodies.rectangle(w + wallThickness/2, h/2, wallThickness, h + wallThickness*2, {isStatic:true, restitution:0.6})
            ]);
        }
        createWalls();

        const imageUrls = [
            'https://i.postimg.cc/Df5HxgWP/1.webp', 'https://i.postimg.cc/1zZvmnnz/2.webp',
            'https://i.postimg.cc/wMPkS7Y6/3.webp', 'https://i.postimg.cc/sf89fQqK/4.webp',
            'https://i.postimg.cc/zGwnkdvy/5.webp', 'https://i.postimg.cc/3wJn0MBb/6.webp',
            'https://i.postimg.cc/FFJGLVyK/7.webp', 'https://i.postimg.cc/KYzDvPG0/8.webp'
        ];

        function spawnImage(x, y) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const size = 70 + Math.random() * 10;
            const ball = Bodies.circle(x, y, size/2, { restitution: 0.6, friction: 0.2, frictionAir: 0.02 });
            Composite.add(world, ball);
            const imgDiv = document.createElement('div');
            imgDiv.className = 'dom-item';
            imgDiv.style.width = size + 'px'; imgDiv.style.height = size + 'px';
            imgDiv.style.backgroundImage = `url('${imageUrls[Math.floor(Math.random() * imageUrls.length)]}')`;
            document.body.appendChild(imgDiv);
            domItems.push({ body: ball, element: imgDiv, size: size });
            playOrganicSound(3); 
        }

        // --- 核心修復：使用感應區產球 ---
        spawnArea.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            spawnImage(touch.clientX, touch.clientY);
        }, { passive: true });

        // 按鈕功能綁定
        document.getElementById('theme-btn').onclick = function() {
            const isNight = document.body.classList.toggle('night-mode');
            this.innerText = isNight ? "☀️ 白天" : "🌙 深夜";
            playOrganicSound(2);
        };

        let isMagnetic = false;
        document.getElementById('magnet-btn').onclick = function() {
            isMagnetic = !isMagnetic;
            this.classList.toggle('active');
            magnetCursor.style.transform = isMagnetic ? `translate(-50%, -50%) scale(1)` : `translate(-50%, -50%) scale(0)`;
        };

        document.getElementById('rain-btn').onclick = () => {
            for(let i=0; i<8; i++) setTimeout(() => spawnImage(Math.random() * (window.innerWidth - 100) + 50, 100), i * 150);
        };

        document.getElementById('bomb-btn').onclick = () => {
            domItems.forEach(item => {
                Body.applyForce(item.body, item.body.position, { x: (Math.random()-0.5)*0.5*item.body.mass, y: (Math.random()-0.5)*0.5*item.body.mass });
            });
            playOrganicSound(5);
        };

        document.getElementById('clear-btn').onclick = () => {
            domItems.forEach(i => { Composite.remove(world, i.body); i.element.remove(); });
            domItems.length = 0;
        };

        let isMotion = false;
        document.getElementById('sensor-btn').onclick = async function() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const state = await DeviceMotionEvent.requestPermission();
                if (state !== 'granted') return;
            }
            isMotion = !isMotion;
            this.classList.toggle('active');
            if (isMotion) window.addEventListener('devicemotion', handleMotion);
            else { window.removeEventListener('devicemotion', handleMotion); engine.gravity.x = 0; engine.gravity.y = 1; }
        };

        function handleMotion(e) {
            if (!isMotion) return;
            const acc = e.accelerationIncludingGravity;
            engine.gravity.x = -(acc.x / 4);
            engine.gravity.y = (acc.y / 4);
        }

        // 磁力與同步
        const mouse = Mouse.create(document.body);
        Events.on(engine, 'afterUpdate', () => {
            if (isMagnetic) {
                magnetCursor.style.left = mouse.position.x + 'px';
                magnetCursor.style.top = mouse.position.y + 'px';
            }
            domItems.forEach(item => {
                const pos = item.body.position;
                if (isMagnetic) {
                    const delta = Vector.sub(mouse.position, pos);
                    if (Vector.magnitude(delta) < 600) {
                        Body.applyForce(item.body, pos, Vector.mult(Vector.normalise(delta), 0.005 * item.body.mass));
                    }
                }
                item.element.style.transform = `translate3d(${pos.x - item.size/2}px, ${pos.y - item.size/2}px, 0) rotate(${item.body.angle}rad)`;
            });
        });

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                const speed = Math.max(p.bodyA.speed, p.bodyB.speed);
                if (speed > 1) playOrganicSound(speed);
            });
        });

        window.addEventListener('resize', () => createWalls());
    </script>
</body>
</html>
