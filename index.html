<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>吉伊卡哇 ASMR - 體感修正版</title>
    
    <link rel="apple-touch-icon" href="icon.png.webp">
    <link rel="icon" href="icon.png.webp">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #fff5f5;
            --text-color: #f472b6;
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            --btn-border: #f472b6;
        }

        .night-mode {
            --bg-color: #0f172a;
            --text-color: #38bdf8;
            --sidebar-bg: rgba(30, 41, 59, 0.95);
            --btn-border: #38bdf8;
        }

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            font-family: -apple-system, system-ui, sans-serif; 
            user-select: none; -webkit-user-select: none;
            touch-action: none; width: 100vw; height: 100vh;
            transition: background 0.5s ease;
        }

        canvas { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; }

        /* --- 右側側邊欄 --- */
        #sidebar {
            position: fixed; top: 0; right: 0;
            width: 110px; height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 15px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            pointer-events: auto;
        }

        #sidebar.collapsed { transform: translateX(100%); }

        #menu-toggle {
            position: absolute; left: -45px; top: 50%;
            width: 45px; height: 70px;
            background: var(--sidebar-bg);
            border-radius: 20px 0 0 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-color);
            font-size: 1.5rem; font-weight: bold;
            transform: translateY(-50%);
            box-shadow: -5px 0 10px rgba(0,0,0,0.05);
            pointer-events: auto;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        
        button { 
            background: #fff; border: 2.5px solid var(--btn-border); color: var(--text-color); 
            padding: 12px 10px; border-radius: 20px; cursor: pointer; 
            font-size: 0.9rem; font-weight: bold; 
            box-shadow: 0 4px 0px var(--btn-border); 
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
            width: 85px; display: block;
            pointer-events: auto;
        }
        .night-mode button { background: #1e293b; }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0px var(--btn-border); }
        
        #magnet-btn.active { background: #f472b6 !important; color: white !important; }
        .night-mode #magnet-btn.active { background: #38bdf8 !important; color: #0f172a !important; }
        #sensor-btn.active { background: #10b981 !important; border-color: #10b981 !important; color: white !important; box-shadow: 0 4px 0px #059669 !important; }

        .dom-item { position: absolute; background-size: cover; border-radius: 50%; pointer-events: none; z-index: 100; background-color: #ffd1dc; will-change: transform; }
        #magnet-cursor { position: absolute; width: 160px; height: 160px; border: 2px dashed var(--text-color); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%) scale(0); z-index: 5; opacity: 0.2; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="menu-toggle">❯</div>
        <div class="btn-group">
            <button id="theme-btn">🌙 深夜</button>
            <button id="sensor-btn">🪄 體感</button>
            <button id="magnet-btn">🧲 磁力</button>
            <button id="rain-btn">🌸 降落</button>
            <button id="bomb-btn">💥 彈開</button>
            <button id="clear-btn">🧹 清空</button>
        </div>
    </div>

    <div id="magnet-cursor"></div>

    <script>
        const { Engine, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body, Vector } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        const magnetCursor = document.getElementById('magnet-cursor');
        
        // --- 溫潤 ASMR 音效 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playOrganicSound(intensity) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350 * (0.9 + Math.random()*0.2), now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(Math.min(intensity * 0.08, 0.3), now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.15);
            } catch(e){}
        }

        Runner.run(Runner.create(), engine);

        const domItems = [];
        const wallThickness = 500;
        const wallOptions = { isStatic: true, restitution: 0.6, friction: 0.2 };
        
        function createWalls() {
            Composite.allBodies(world).filter(b => b.isStatic).forEach(b => Composite.remove(world, b));
            const w = window.innerWidth, h = window.innerHeight;
            Composite.add(world, [
                Bodies.rectangle(w/2, h + wallThickness/2, w + wallThickness*2, wallThickness, wallOptions),
                Bodies.rectangle(w/2, -wallThickness/2, w + wallThickness*2, wallThickness, wallOptions),
                Bodies.rectangle(-wallThickness/2, h/2, wallThickness, h + wallThickness*2, wallOptions),
                Bodies.rectangle(w + wallThickness/2, h/2, wallThickness, h + wallThickness*2, wallOptions)
            ]);
        }
        createWalls();

        const imageUrls = [
            'https://i.postimg.cc/Df5HxgWP/1.webp', 'https://i.postimg.cc/1zZvmnnz/2.webp',
            'https://i.postimg.cc/wMPkS7Y6/3.webp', 'https://i.postimg.cc/sf89fQqK/4.webp',
            'https://i.postimg.cc/zGwnkdvy/5.webp', 'https://i.postimg.cc/3wJn0MBb/6.webp',
            'https://i.postimg.cc/FFJGLVyK/7.webp', 'https://i.postimg.cc/KYzDvPG0/8.webp'
        ];

        function spawnImage(x, y) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const url = imageUrls[Math.floor(Math.random() * imageUrls.length)];
            const size = 68 + Math.random() * 10;
            const ball = Bodies.circle(x, y, size/2, { restitution: 0.6, friction: 0.2, frictionAir: 0.02 });
            Composite.add(world, ball);
            const imgDiv = document.createElement('div');
            imgDiv.className = 'dom-item';
            imgDiv.style.width = size + 'px'; imgDiv.style.height = size + 'px';
            imgDiv.style.backgroundImage = `url('${url}')`;
            document.body.appendChild(imgDiv);
            domItems.push({ body: ball, element: imgDiv, size: size });
            playOrganicSound(3); 
        }

        // --- 核心修復：防止事件衝突 ---
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(world, mouseConstraint);

        const handleInteraction = (clientX, clientY, target) => {
            if (target.closest('#sidebar')) return;
            setTimeout(() => {
                if (!mouseConstraint.body) spawnImage(clientX, clientY);
            }, 50);
        };

        document.addEventListener('touchstart', (e) => {
            handleInteraction(e.touches[0].clientX, e.touches[0].clientY, e.target);
        }, { passive: true });

        document.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY, e.target);
        });

        // --- 按鈕事件綁定 ---
        const btnMenu = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        btnMenu.onclick = () => {
            sidebar.classList.toggle('collapsed');
            btnMenu.innerText = sidebar.classList.contains('collapsed') ? "❮" : "❯";
            playOrganicSound(2);
        };

        document.getElementById('theme-btn').onclick = function() {
            const isNight = document.body.classList.toggle('night-mode');
            this.innerText = isNight ? "☀️ 白天" : "🌙 深夜";
            playOrganicSound(2);
        };

        let isMagnetic = false;
        document.getElementById('magnet-btn').onclick = function() {
            isMagnetic = !isMagnetic;
            this.classList.toggle('active');
            magnetCursor.style.transform = isMagnetic ? `translate(-50%, -50%) scale(1)` : `translate(-50%, -50%) scale(0)`;
        };

        // --- 體感授權修正版 ---
        let isMotion = false;
        document.getElementById('sensor-btn').onclick = async function() {
            // iOS 必須在 HTTPS 環境下才能啟動體感
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                alert("體感功能需要 HTTPS 安全連線才能開啟喔！");
                return;
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceMotionEvent.requestPermission();
                    if (response !== 'granted') {
                        alert("需要同意授權，球球才會滾動喔！");
                        return;
                    }
                } catch (e) {
                    alert("授權過程發生錯誤：" + e);
                    return;
                }
            }
            
            isMotion = !isMotion;
            this.classList.toggle('active');
            if (isMotion) window.addEventListener('devicemotion', handleMotion);
            else {
                window.removeEventListener('devicemotion', handleMotion);
                engine.gravity.x = 0; engine.gravity.y = 1;
            }
        };

        function handleMotion(e) {
            if (!isMotion) return;
            const acc = e.accelerationIncludingGravity;
            // iOS 座標修正
            engine.gravity.x = -(acc.x / 4);
            engine.gravity.y = (acc.y / 4);
        }

        document.getElementById('rain-btn').onclick = () => {
            for(let i=0; i<8; i++) setTimeout(() => spawnImage(Math.random() * (window.innerWidth - 150) + 50, 100), i * 150);
        };

        document.getElementById('bomb-btn').onclick = () => {
            domItems.forEach(item => {
                Body.applyForce(item.body, item.body.position, { x: (Math.random()-0.5)*0.5*item.body.mass, y: (Math.random()-0.5)*0.5*item.body.mass });
            });
            playOrganicSound(5);
        };

        document.getElementById('clear-btn').onclick = () => {
            domItems.forEach(i => { Composite.remove(world, i.body); i.element.remove(); });
            domItems.length = 0;
        };

        // --- 更新與同步 ---
        Events.on(engine, 'afterUpdate', () => {
            const mPos = mouse.position;
            if (isMagnetic) {
                magnetCursor.style.left = mPos.x + 'px';
                magnetCursor.style.top = mPos.y + 'px';
            }
            domItems.forEach(item => {
                const pos = item.body.position;
                if (isMagnetic && (mouse.button === 0 || mouse.button === -1)) {
                    const delta = Vector.sub(mPos, pos);
                    if (Vector.magnitude(delta) < 600) {
                        Body.applyForce(item.body, pos, Vector.mult(Vector.normalise(delta), 0.0055 * item.body.mass));
                    }
                }
                item.element.style.transform = `translate3d(${pos.x - item.size/2}px, ${pos.y - item.size/2}px, 0) rotate(${item.body.angle}rad)`;
            });
        });

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                const speed = Math.max(p.bodyA.speed, p.bodyB.speed);
                if (speed > 1) playOrganicSound(speed);
            });
        });

        window.addEventListener('resize', () => createWalls());
    </script>
</body>
</html>
