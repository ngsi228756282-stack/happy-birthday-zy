<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> ASMR 紓壓球 </title>
    
    <link rel="apple-touch-icon" href="icon.png.webp">
    <link rel="icon" href="icon.png.webp">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        /* 基礎變數：方便一鍵切換晝夜 */
        :root {
            --bg-color: #fff5f5;
            --text-color: #f472b6;
            --btn-bg: white;
            --btn-border: #f472b6;
            --ui-bg: rgba(255, 255, 255, 0.7);
            --cursor-color: rgba(244, 114, 182, 0.4);
        }

        /* 深夜模式變數 */
        .night-mode {
            --bg-color: #0f172a; /* 深午夜藍 */
            --text-color: #38bdf8; /* 柔和天藍 */
            --btn-bg: #1e293b;
            --btn-border: #38bdf8;
            --ui-bg: rgba(15, 23, 42, 0.8);
            --cursor-color: rgba(56, 189, 248, 0.3);
        }

        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-color); 
            font-family: sans-serif; user-select: none; touch-action: none; 
            width: 100vw; height: 100vh;
            transition: background 0.8s ease; /* 緩慢切換背景，像黃昏入夜一樣 */
        }

        canvas { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; z-index: 1; }
        
        #ui-layer { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; color: var(--text-color); z-index: 100; transition: color 0.5s; }
        h1 { margin: 0; font-size: 1rem; background: var(--ui-bg); display: inline-block; padding: 6px 20px; border-radius: 20px; transition: background 0.5s; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; flex-wrap: wrap; padding: 0 10px; box-sizing: border-box; pointer-events: auto; }
        button { 
            background: var(--btn-bg); border: 2px solid var(--btn-border); color: var(--text-color); 
            padding: 10px 18px; border-radius: 25px; cursor: pointer; font-size: 0.9rem; font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.3s; -webkit-tap-highlight-color: transparent; 
        }
        button:active { transform: translateY(2px); }
        
        /* 模式切換按鈕特殊顏色 */
        #theme-btn { border-color: #fbbf24; color: #fbbf24; }
        .night-mode #theme-btn { border-color: #fbbf24; color: #fbbf24; }

        #magnet-btn.active { background: #f472b6; color: white; border-color: #f472b6; }
        .night-mode #magnet-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        
        #sensor-btn.active { background: #10b981; border-color: #10b981; color: white; }

        .dom-item { 
            position: absolute; background-size: cover; background-repeat: no-repeat; background-position: center; 
            border-radius: 50%; pointer-events: none; z-index: 50; 
            background-color: #ffd1dc; will-change: transform;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #magnet-cursor { 
            position: absolute; width: 180px; height: 180px; 
            border: 2px dashed var(--cursor-color); border-radius: 50%; 
            pointer-events: none; transform: translate(-50%, -50%) scale(0); 
            transition: transform 0.2s, border 0.5s; z-index: 5; 
            background: radial-gradient(circle, var(--cursor-color) 0%, transparent 70%); 
        }
    </style>
</head>
<body>

    <div id="ui-layer"><h1>ASMR 紓壓球</h1></div>

    <div id="controls">
        <button id="theme-btn" onclick="toggleTheme()">🌙 深夜模式</button>
        <button id="sensor-btn" onclick="toggleSensor()">🪄 體感</button>
        <button id="magnet-btn" onclick="toggleMagnet()">🧲 磁力</button>
        <button onclick="rainSurprises()">🌸 降落</button>
        <button onclick="explodeAll()">💥 彈開</button>
        <button onclick="clearAll()">🧹 清空</button>
    </div>

    <div id="magnet-cursor"></div>

    <script>
        const { Engine, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body, Vector } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        const magnetCursor = document.getElementById('magnet-cursor');
        
        // --- 溫潤質感 ASMR 聲音系統 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playOrganicSound(intensity) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const pitchShift = 0.9 + Math.random() * 0.2; 
                const volume = Math.min(intensity * 0.08, 0.3);

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(350 * pitchShift, now);
                osc.frequency.exponentialRampToValueAtTime(100 * pitchShift, now + 0.1);
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1200, now);

                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.15);
            } catch(e){}
        }

        const runner = Runner.create();
        Runner.run(runner, engine);

        const domItems = [];
        const wallThickness = 500;
        const wallOptions = { isStatic: true, restitution: 0.6, friction: 0.2 };
        
        function createWalls() {
            Composite.allBodies(world).filter(b => b.isStatic).forEach(b => Composite.remove(world, b));
            const w = window.innerWidth, h = window.innerHeight;
            const walls = [
                Bodies.rectangle(w/2, h + wallThickness/2, w + wallThickness*2, wallThickness, wallOptions),
                Bodies.rectangle(w/2, -wallThickness/2, w + wallThickness*2, wallThickness, wallOptions),
                Bodies.rectangle(-wallThickness/2, h/2, wallThickness, h + wallThickness*2, wallOptions),
                Bodies.rectangle(w + wallThickness/2, h/2, wallThickness, h + wallThickness*2, wallOptions)
            ];
            Composite.add(world, walls);
        }
        createWalls();

        // --- 晝夜切換邏輯 ---
        let isDarkMode = false;
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('night-mode');
            const btn = document.getElementById('theme-btn');
            if (isDarkMode) {
                btn.innerHTML = "☀️ 白天模式";
            } else {
                btn.innerHTML = "🌙 深夜模式";
            }
            // 晝夜交替時播放一個沉穩的提示音
            playOrganicSound(2);
        }

        const imageUrls = [
            'https://i.postimg.cc/Df5HxgWP/1.webp', 'https://i.postimg.cc/1zZvmnnz/2.webp',
            'https://i.postimg.cc/wMPkS7Y6/3.webp', 'https://i.postimg.cc/sf89fQqK/4.webp',
            'https://i.postimg.cc/zGwnkdvy/5.webp', 'https://i.postimg.cc/3wJn0MBb/6.webp',
            'https://i.postimg.cc/FFJGLVyK/7.webp', 'https://i.postimg.cc/KYzDvPG0/8.webp'
        ];

        function spawnImage(x, y) {
            const safeX = Math.max(50, Math.min(window.innerWidth - 50, x));
            const safeY = Math.max(50, Math.min(window.innerHeight - 50, y));
            const url = imageUrls[Math.floor(Math.random() * imageUrls.length)];
            const size = 68 + Math.random() * 12;
            const ball = Bodies.circle(safeX, safeY, size/2, { restitution: 0.6, friction: 0.2, frictionAir: 0.02 });
            Composite.add(world, ball);
            const imgDiv = document.createElement('div');
            imgDiv.className = 'dom-item';
            imgDiv.style.width = size + 'px'; imgDiv.style.height = size + 'px';
            imgDiv.style.backgroundImage = `url('${url}')`;
            document.body.appendChild(imgDiv);
            domItems.push({ body: ball, element: imgDiv, size: size });
            playOrganicSound(3); 
        }

        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(world, mouseConstraint);

        const controls = document.getElementById('controls');
        const stop = (e) => e.stopPropagation();
        controls.addEventListener('mousedown', stop);
        controls.addEventListener('touchstart', stop);

        Events.on(mouseConstraint, 'mousedown', (e) => {
            if (!mouseConstraint.body) spawnImage(e.mouse.position.x, e.mouse.position.y);
        });

        let isMagnetic = false;
        function toggleMagnet() {
            isMagnetic = !isMagnetic;
            document.getElementById('magnet-btn').classList.toggle('active');
            magnetCursor.style.transform = isMagnetic ? `translate(-50%, -50%) scale(1)` : `translate(-50%, -50%) scale(0)`;
            domItems.forEach(item => { item.body.frictionAir = isMagnetic ? 0.06 : 0.02; });
        }

        Events.on(engine, 'afterUpdate', () => {
            const mPos = mouse.position;
            if (isMagnetic) {
                magnetCursor.style.left = mPos.x + 'px';
                magnetCursor.style.top = mPos.y + 'px';
            }
            domItems.forEach(item => {
                const pos = item.body.position;
                if (isMagnetic && (mouse.button === 0 || mouse.button === -1)) {
                    const delta = Vector.sub(mPos, pos);
                    const dist = Vector.magnitude(delta);
                    if (dist < 650) {
                        const forceMagnitude = 0.0055 * item.body.mass;
                        Body.applyForce(item.body, pos, Vector.mult(Vector.normalise(delta), forceMagnitude));
                    }
                }
                item.element.style.transform = `translate3d(${pos.x - item.size/2}px, ${pos.y - item.size/2}px, 0) rotate(${item.body.angle}rad)`;
            });
        });

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const speed = Math.max(pair.bodyA.speed, pair.bodyB.speed);
                if (speed > 1.0) playOrganicSound(speed);
            });
        });

        let isMotion = false;
        async function toggleSensor() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const s = await DeviceMotionEvent.requestPermission();
                if (s !== 'granted') return;
            }
            isMotion = !isMotion;
            document.getElementById('sensor-btn').classList.toggle('active');
            if (isMotion) window.addEventListener('devicemotion', handleMotion);
            else { window.removeEventListener('devicemotion', handleMotion); engine.gravity.x = 0; engine.gravity.y = 1; }
        }
        function handleMotion(e) {
            if (!isMotion) return;
            engine.gravity.x = -(e.accelerationIncludingGravity.x / 3.5);
            engine.gravity.y = e.accelerationIncludingGravity.y / 3.5;
        }

        function rainSurprises() {
            for(let i=0; i<12; i++) setTimeout(() => spawnImage(Math.random() * (window.innerWidth - 100) + 50, 100), i * 120);
        }
        function explodeAll() {
            domItems.forEach(item => {
                const force = { x: (Math.random()-0.5)*0.5*item.body.mass, y: (Math.random()-0.5)*0.5*item.body.mass };
                Body.applyForce(item.body, item.body.position, force);
            });
        }
        function clearAll() {
            domItems.forEach(i => { Composite.remove(world, i.body); i.element.remove(); });
            domItems.length = 0;
        }
        window.addEventListener('resize', () => createWalls());
    </script>
</body>
</html>
